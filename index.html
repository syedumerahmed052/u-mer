<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Landing Page</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      line-height: 1.6;
      color: #333;
    }

    header {
      background: #4CAF50;
      color: white;
      padding: 20px;
      text-align: center;
    }

    .hero {
      padding: 60px 20px;
      text-align: center;
      background: #f4f4f4;
    }

    .hero h1 {
      font-size: 2.5em;
      margin-bottom: 10px;
    }

    .hero p {
      font-size: 1.2em;
      margin-bottom: 20px;
    }

    .btn {
      display: inline-block;
      padding: 12px 25px;
      background: #4CAF50;
      color: white;
      text-decoration: none;
      border-radius: 5px;
    }

    .features {
      display: flex;
      flex-wrap: wrap;
      padding: 40px 20px;
      justify-content: center;
      gap: 20px;
    }

    .feature {
      flex: 1 1 250px;
      max-width: 300px;
      background: #fff;
      padding: 20px;
      border: 1px solid #ddd;
      border-radius: 5px;
      text-align: center;
    }

    .cta {
      background: #4CAF50;
      color: white;
      text-align: center;
      padding: 40px 20px;
    }

    footer {
      text-align: center;
      padding: 20px;
      background: #333;
      color: white;
    }

    @media (max-width: 600px) {
      .hero h1 {
        font-size: 2em;
      }
    }
  </style>
</head>
<body>

<header>
  <h2>Your Brand</h2>
</header>

<section class="hero">
  <h1>Welcome to Our Product</h1>
  <p>Build something amazing with our solution.</p>
  <a href="#" class="btn">Get Started</a>
</section>

<section class="features">
  <div class="feature">
    <h3>Feature One</h3>
    <p>Short description of the feature.</p>
  </div>
  <div class="feature">
    <h3>Feature Two</h3>
    <p>Short description of the feature.</p>
  </div>
  <div class="feature">
    <h3>Feature Three</h3>
    <p>Short description of the feature.</p>
  </div>
</section>

<section class="cta">
  <h2>Ready to start?</h2>
  <a href="#" class="btn">Sign Up Now</a>
</section>

<footer>
  <p>&copy; 2026 Your Company</p>
</footer>

</body>
</html>
